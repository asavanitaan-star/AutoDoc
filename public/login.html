<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>เข้าสู่ระบบ — AutoDoc PCR</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="login-body">
  <div class="login-card">
    <div class="login-logo" id="loginLogo"></div>
    <h1>AutoDoc <span>PCR</span></h1>
    <p class="muted">เข้าสู่ระบบเพื่อจัดการ Certificate of Calibration</p>
    <form id="loginForm">
      <label>ชื่อผู้ใช้<input id="username" autocomplete="username" required /></label>
      <label>รหัสผ่าน<input id="password" type="password" autocomplete="current-password" required /></label>
      <div id="loginError" class="login-error" hidden></div>
      <button class="btn primary" type="submit">เข้าสู่ระบบ</button>
    </form>
    <p class="login-alt"><a href="/register.html">ยังไม่มีบัญชี? สมัครสมาชิก</a></p>
  </div>
  <script src="logo.js"></script>
  <script src="login.js"></script>
</body>
</html>
